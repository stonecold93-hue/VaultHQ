<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaultHQ — Golden</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#030200;
  --v1:#2DD4BF;--v2:#0F9B87;--v3:#065C52;
  --v-border:#0A4A42;--v-bg:#01100E;
  --silver:#9EADB2;--silver-dim:#6A7E85;
  --amber:#F4A623;--amber-dim:#C47D0E;--amber-deep:#8A5600;
}
body{background:var(--bg);font-family:"Cormorant Garamond",serif;margin:0;padding:0;color:#fffbf0;}

/* LOADING */
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;}
#loading span{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--v1);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:.3;}50%{opacity:.8;}}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:998;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:40px;padding:40px 24px;}
#login-screen::before{content:"";position:absolute;width:80vw;height:80vw;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--v1),transparent);opacity:.05;pointer-events:none;}
.login-wm{display:flex;flex-direction:column;align-items:center;gap:14px;z-index:1;}
.login-orn{display:flex;align-items:center;gap:12px;}
.login-orn .ol{width:40px;height:.5px;background:var(--silver-dim);opacity:.35;}
.login-orn .og{width:6px;height:6px;background:var(--v1);transform:rotate(45deg);}
.login-row{display:flex;align-items:baseline;gap:10px;}
.login-title{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:56px;line-height:1;letter-spacing:.1em;background:linear-gradient(160deg,#B2FFF8,var(--v1),var(--v2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-divider{width:1px;height:36px;background:linear-gradient(180deg,transparent,rgba(158,173,178,0.3),transparent);}
.login-hq{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:56px;line-height:1;letter-spacing:.06em;background:linear-gradient(160deg,#FFF,var(--silver));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.login-sub{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--silver);}
.login-golden{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--amber-deep);opacity:.45;}
#btn-google{display:flex;align-items:center;gap:12px;z-index:1;border:0.5px solid var(--v-border);background:var(--v-bg);padding:16px 32px;border-radius:3px;cursor:pointer;width:100%;max-width:280px;justify-content:center;}
#btn-google span{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--silver);}

/* APP */
#app{display:none;}

/* ── MOBILE NAV (défaut — mobile first) ── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(3,2,0,0.97);
  border-bottom:0.5px solid rgba(158,173,178,0.1);
  backdrop-filter:blur(8px);
}
.top-bar-main{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-golden{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:14px;letter-spacing:.2em;background:linear-gradient(170deg,#FFFBF0,#F4A623,#C47D0E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-sep{width:.5px;height:16px;background:rgba(158,173,178,0.2);}
.tb-vault{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:14px;letter-spacing:.14em;color:var(--silver);}
.tb-right{display:flex;align-items:center;gap:10px;}
#user-avatar{width:26px;height:26px;border-radius:50%;border:.5px solid var(--v-border);object-fit:cover;display:none;}
.tb-add{
  display:flex;align-items:center;gap:7px;
  border:.5px solid var(--v-border);background:rgba(45,212,191,0.09);
  padding:8px 14px;border-radius:2px;cursor:pointer;
}
.tb-add-dot{width:4px;height:4px;background:var(--v1);transform:rotate(45deg);}
.tb-add span{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--v1);}
#btn-logout-m{font-family:"DM Mono",monospace;font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--silver-dim);opacity:.35;cursor:pointer;background:none;border:none;}

/* tabs scrollables */
.top-tabs{
  display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  border-top:.5px solid rgba(10,74,66,0.3);
}
.top-tabs::-webkit-scrollbar{display:none;}
.top-tabs a{
  display:block;flex-shrink:0;
  font-family:"DM Mono",monospace;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--silver-dim);text-decoration:none;
  padding:9px 14px;
  border-bottom:2px solid transparent;
  white-space:nowrap;transition:color .2s,border-color .2s;
}
.top-tabs a.active{color:var(--v1);border-bottom-color:var(--v1);}

/* HERO mobile */
.hero{
  padding:130px 20px 40px;
  display:flex;flex-direction:column;align-items:center;gap:32px;
  position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;width:80vw;height:80vw;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,var(--v1),transparent);opacity:.05;pointer-events:none;}
.hero-wm{display:flex;flex-direction:column;align-items:center;gap:14px;z-index:1;}
.orn{display:flex;align-items:center;gap:12px;}
.ol{width:40px;height:.5px;background:var(--silver-dim);opacity:.3;}
.og{width:6px;height:6px;background:var(--v1);transform:rotate(45deg);}
.hero-row{display:flex;align-items:baseline;gap:8px;}
.hero-vault{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:52px;line-height:1;letter-spacing:.1em;background:linear-gradient(160deg,#B2FFF8,var(--v1),var(--v2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-div{width:1px;height:34px;background:linear-gradient(180deg,transparent,rgba(158,173,178,0.25),transparent);}
.hero-hq{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:52px;line-height:1;letter-spacing:.06em;background:linear-gradient(160deg,#FFF,var(--silver));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--silver);}

/* STATS mobile */
.stats{display:flex;width:100%;border:.5px solid rgba(158,173,178,0.12);border-radius:3px;overflow:hidden;z-index:1;}
.stat{flex:1;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border-right:.5px solid rgba(158,173,178,0.1);background:rgba(3,2,0,0.5);}
.stat:last-child{border-right:none;}
.stat-n{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:22px;background:linear-gradient(160deg,#B2FFF8,var(--v1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-l{font-family:"DM Mono",monospace;font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--silver-dim);opacity:.7;}

/* SECTION */
.section{padding:0 14px 40px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:.5px solid rgba(158,173,178,0.08);}
.sec-label{display:flex;align-items:center;gap:10px;}
.sec-label .ol{width:18px;}
.sec-title{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:var(--silver-dim);opacity:.7;}
.sec-count{font-family:"Cormorant Garamond",serif;font-size:12px;font-style:italic;color:rgba(158,173,178,.2);}

/* CARDS — 1 colonne mobile */
.grid{display:grid;grid-template-columns:1fr;gap:10px;}
.card{border:.5px solid var(--v-border);background:var(--v-bg);border-radius:3px;padding:18px 16px 14px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px;}
.card::before{content:"";position:absolute;width:80px;height:80px;border-radius:50%;top:-10px;right:-10px;background:radial-gradient(circle,var(--v1),transparent);opacity:.07;pointer-events:none;}
.card-status{position:absolute;top:14px;right:14px;display:flex;align-items:center;gap:4px;}
.pip{width:5px;height:5px;border-radius:50%;background:var(--v1);box-shadow:0 0 5px var(--v1);}
.pip.dim{background:var(--silver-dim);box-shadow:none;opacity:.5;}
.pip.done{background:#34C472;box-shadow:0 0 5px #34C472;}
.status-label{font-family:"DM Mono",monospace;font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--silver);opacity:.6;}
.status-label.dim{color:var(--silver-dim);opacity:.4;}
.status-label.done{color:#34C472;opacity:.8;}
.card-orn{display:flex;align-items:center;gap:4px;}
.card-orn .mo{width:12px;height:.5px;background:var(--v-border);}
.card-orn .mg{width:4px;height:4px;transform:rotate(45deg);background:var(--v1);flex-shrink:0;}
.card-cat{font-family:"DM Mono",monospace;font-size:7px;letter-spacing:.28em;text-transform:uppercase;color:var(--silver-dim);opacity:.6;}
.card-name{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:18px;letter-spacing:.02em;background:linear-gradient(160deg,#F0FFFD,#B2FFF8,var(--v1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;}
.card-desc{font-family:"Cormorant Garamond",serif;font-weight:300;font-style:italic;font-size:13px;color:var(--silver);opacity:.35;line-height:1.5;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:.5px solid rgba(10,74,66,0.35);}
.card-date{font-family:"DM Mono",monospace;font-size:7px;letter-spacing:.18em;color:var(--silver-dim);opacity:.35;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-family:"DM Mono",monospace;font-size:6.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--v2);opacity:.55;border:.5px solid rgba(15,155,135,0.22);padding:2px 5px;border-radius:2px;}
.card-del{font-family:"DM Mono",monospace;font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:#F06060;opacity:.5;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:4px;text-align:left;}
.cards-empty{text-align:center;padding:50px 0;font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.28em;color:var(--silver-dim);opacity:.35;}

/* MODAL FORM — plein écran mobile */
#form-modal{
  display:none;position:fixed;inset:0;z-index:400;
  background:var(--bg);overflow-y:auto;
  padding:80px 20px 40px;
}
#form-modal.open{display:block;}
.form-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.form-modal-title{font-family:"Cormorant Garamond",serif;font-weight:300;font-style:italic;font-size:22px;color:var(--silver);}
#btn-close-modal{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.28em;text-transform:uppercase;color:var(--silver-dim);opacity:.5;background:none;border:none;cursor:pointer;padding:8px;}
.form-fields{display:flex;flex-direction:column;gap:16px;}
.f-field{display:flex;flex-direction:column;gap:8px;}
.f-label{font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--silver-dim);opacity:.6;}
.f-input{background:rgba(3,2,0,0.6);border:.5px solid rgba(10,74,66,0.55);border-radius:2px;padding:12px 14px;font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:300;color:var(--silver);outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .2s;}
.f-input::placeholder{color:rgba(158,173,178,.18);}
.f-input:focus{border-color:var(--v2);}
.f-textarea{resize:none;min-height:100px;line-height:1.5;}
.btn-save{display:flex;align-items:center;justify-content:center;gap:8px;border:.5px solid var(--v2);background:rgba(45,212,191,0.08);padding:14px 24px;border-radius:2px;cursor:pointer;width:100%;margin-top:8px;}
.btn-save span{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--silver);}
.btn-save-dot{width:4px;height:4px;background:var(--v1);transform:rotate(45deg);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--v-bg);border:.5px solid var(--v-border);padding:12px 20px;border-radius:3px;z-index:500;font-family:"DM Mono",monospace;font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--silver);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── DESKTOP (768px+) ── */
@media(min-width:769px){
  /* remplace top-bar par nav classique */
  .top-bar{padding:0;}
  .top-bar-main{padding:16px 40px;}
  .tb-add span{display:inline;}
  .top-tabs{border-top:none;background:transparent;}
  .top-tabs a{padding:12px 12px;font-size:8px;}

  .hero{padding:140px 40px 60px;gap:48px;}
  .hero-vault{font-size:80px;}
  .hero-hq{font-size:80px;}
  .hero-div{height:52px;}
  .hero-sub{font-size:10px;}
  .ol{width:56px;}

  .stats .stat{padding:14px 32px;}
  .stats .stat-n{font-size:28px;}
  .stats .stat-l{font-size:8px;}

  .section{padding:0 40px 80px;max-width:1100px;margin:0 auto;}
  .grid{grid-template-columns:repeat(3,1fr);gap:12px;}
  .cards-empty{grid-column:span 3;}

  #form-modal{padding:120px 40px 60px;max-width:600px;left:50%;transform:translateX(-50%);border-left:.5px solid var(--v-border);border-right:.5px solid var(--v-border);}

  /* logout visible desktop */
  #btn-logout-m{display:inline;}
}
</style>
</head>
<body>

<div id="loading"><span>VaultHQ…</span></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wm">
    <div class="login-orn"><div class="ol"></div><div class="og"></div><div class="ol"></div></div>
    <div class="login-row">
      <span class="login-title">Vault</span>
      <div class="login-divider"></div>
      <span class="login-hq">HQ</span>
    </div>
    <span class="login-sub">My ideas, my vault.</span>
    <span class="login-golden" style="margin-top:4px;">Golden · 2026</span>
  </div>
  <button id="btn-google">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.658 14.017 17.64 11.71 17.64 9.2z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"/>
    </svg>
    <span>Continuer avec Google</span>
  </button>
</div>

<!-- APP -->
<div id="app">

  <!-- TOP BAR (mobile + desktop) -->
  <div class="top-bar">
    <div class="top-bar-main">
      <div class="tb-brand">
        <span class="tb-golden">Golden</span>
        <div class="tb-sep"></div>
        <span class="tb-vault">VaultHQ</span>
      </div>
      <div class="tb-right">
        <img id="user-avatar" src="" alt="avatar">
        <button class="tb-add" id="btn-open-form">
          <div class="tb-add-dot"></div>
          <span>Nouvelle entrée</span>
        </button>
        <button id="btn-logout-m">Déco</button>
      </div>
    </div>
    <!-- tabs scrollables -->
    <div class="top-tabs">
      <a href="#" class="active" data-cat="all">All</a>
      <a href="#" data-cat="My Website">Website</a>
      <a href="#" data-cat="My Project">Project</a>
      <a href="#" data-cat="My Kitchen">Kitchen</a>
      <a href="#" data-cat="My Renovation">Renovation</a>
      <a href="#" data-cat="My Games">Games</a>
      <a href="#" data-cat="New Idea">New Idea</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-wm">
      <div class="orn"><div class="ol"></div><div class="og"></div><div class="ol"></div></div>
      <div class="hero-row">
        <span class="hero-vault">Vault</span>
        <div class="hero-div"></div>
        <span class="hero-hq">HQ</span>
      </div>
      <span class="hero-sub">My ideas, my vault.</span>
    </div>
    <div class="stats">
      <div class="stat"><span class="stat-n" id="stat-total">0</span><span class="stat-l">Ideas</span></div>

      <div class="stat"><span class="stat-n" id="stat-month">—</span><span class="stat-l">Month</span></div>
    </div>
  </div>

  <!-- SECTION -->
  <div class="section">
    <div class="section-header">
      <div class="sec-label">
        <div class="ol"></div><div class="og"></div>
        <span class="sec-title" id="sec-title">All entries</span>
      </div>
      <span class="sec-count" id="sec-count"></span>

    <div class="grid" id="grid"></div>
  </div>

  <!-- MODAL FORM (plein écran) -->
  <div id="form-modal">

    <div class="form-fields">

        <span class="f-label">Catégorie</span>
        <select class="f-input" id="f-cat">
          <option value="" disabled selected>Choisir…</option>
          <option>My Website</option>

        <span class="f-label">Description</span>
        <textarea class="f-input f-textarea" id="f-desc" placeholder="Décris l'idée…"></textarea>
      </div>
      <div class="f-field">
        <span class="f-label">Statut</span>
        <select class="f-input" id="f-status">
          <option value="" disabled selected>Choisir…</option>
          <option>Thinking</option>
          <option>Active</option>
          <option>Launched</option>
        </select>
      </div>
      <div class="f-field">
        <span class="f-label">Tags (virgule)</span>
        <input class="f-input" id="f-tags" type="text" placeholder="Firebase, recette…">
      </div>
      <button class="btn-save" id="btn-save">
        <div class="btn-save-dot"></div>
        <span>Verrouiller l'idée</span>
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc,
  onSnapshot, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0lzr1iJhITZmUv62kPlu3kyxd47ak_QY",
  authDomain: "vaulthq-9cc84.firebaseapp.com",
  projectId: "vaulthq-9cc84",
  storageBucket: "vaulthq-9cc84.firebasestorage.app",
  messagingSenderId: "446466751362",
  appId: "1:446466751362:web:9e602e47278831f1b6ad9b",
  measurementId: "G-D9SYJJXRV8"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser = null, allIdeas = [], activeFilter = "all", unsubscribe = null;

const loginScreen = document.getElementById("login-screen");
const loadingEl   = document.getElementById("loading");
const appDiv      = document.getElementById("app");
const grid        = document.getElementById("grid");
const formModal   = document.getElementById("form-modal");

// AUTH
document.getElementById("btn-google").addEventListener("click", async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showToast("Erreur connexion"); }
});
document.getElementById("btn-logout-m").addEventListener("click", () => signOut(auth));

onAuthStateChanged(auth, user => {
  loadingEl.style.display = "none";
  if (user) {
    currentUser = user;
    loginScreen.style.display = "none";
    appDiv.style.display = "block";
    const av = document.getElementById("user-avatar");
    if (user.photoURL) { av.src = user.photoURL; av.style.display = "block"; }
    listenIdeas();
  } else {
    currentUser = null;
    loginScreen.style.display = "flex";
    appDiv.style.display = "none";
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  }
});

// FIRESTORE
function ideasRef(){ return collection(db,"users",currentUser.uid,"ideas"); }
function listenIdeas(){
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(query(ideasRef(), orderBy("createdAt","desc")), snap => {
    allIdeas = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderAll();
  }, () => showToast("Erreur Firestore"));
}
async function addIdea(data){ await addDoc(ideasRef(),{...data,createdAt:serverTimestamp()}); }
async function deleteIdea(id){ await deleteDoc(doc(db,"users",currentUser.uid,"ideas",id)); }

// RENDER
function renderAll(){
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("stat-total").textContent    = allIdeas.length;
  document.getElementById("stat-active").textContent   = allIdeas.filter(i=>i.status==="Active").length;
  document.getElementById("stat-launched").textContent = allIdeas.filter(i=>i.status==="Launched").length;
  document.getElementById("stat-month").textContent    = months[new Date().getMonth()];
  renderCards();
}
function renderCards(){
  const list = activeFilter==="all" ? allIdeas : allIdeas.filter(i=>i.category===activeFilter);
  document.getElementById("sec-title").textContent = activeFilter==="all" ? "All entries" : activeFilter;
  document.getElementById("sec-count").textContent = list.length+" entr"+(list.length>1?"ées":"ée");
  if(!list.length){ grid.innerHTML=`<div class="cards-empty">Aucune entrée — ajoutes-en une !</div>`; return; }
  grid.innerHTML = list.map(idea=>{
    const p = idea.status==="Launched"?"done":idea.status==="Thinking"?"dim":"";
    const date = idea.createdAt?.toDate ? idea.createdAt.toDate().toLocaleDateString("fr-CA",{year:"numeric",month:"short",day:"numeric"}) : "—";
    const tags = (idea.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    return `<div class="card">
      <div class="card-status"><div class="pip ${p}"></div><span class="status-label ${p}">${idea.status||"Thinking"}</span></div>
      <div class="card-orn"><div class="mo"></div><div class="mg"></div><div class="mo"></div></div>
      <span class="card-cat">${idea.category||""}</span>
      <div class="card-name">${idea.name||""}</div>
      ${idea.description?`<div class="card-desc">${idea.description}</div>`:""}
      <div class="card-footer"><span class="card-date">${date}</span><div class="card-tags">${tags}</div></div>
      <button class="card-del" data-id="${idea.id}">Supprimer</button>
    </div>`;
  }).join("");
  grid.querySelectorAll(".card-del").forEach(btn=>{
    btn.addEventListener("click", async e=>{
      e.stopPropagation();
      if(confirm("Supprimer ?")){ await deleteIdea(btn.dataset.id); showToast("Supprimée"); }
    });
  });
}

// FILTRES
document.querySelectorAll(".top-tabs a").forEach(a=>{
  a.addEventListener("click", e=>{
    e.preventDefault();
    document.querySelectorAll(".top-tabs a").forEach(x=>x.classList.remove("active"));
    a.classList.add("active");
    activeFilter = a.dataset.cat;
    renderCards();
  });
});

// MODAL FORM
document.getElementById("btn-open-form").addEventListener("click", ()=>{ formModal.classList.add("open"); });
document.getElementById("btn-close-modal").addEventListener("click", ()=>{ formModal.classList.remove("open"); resetForm(); });

document.getElementById("btn-save").addEventListener("click", async ()=>{
  const name   = document.getElementById("f-name").value.trim();
  const cat    = document.getElementById("f-cat").value;
  const desc   = document.getElementById("f-desc").value.trim();
  const status = document.getElementById("f-status").value;
  const tags   = document.getElementById("f-tags").value.split(",").map(t=>t.trim()).filter(Boolean);
  if(!name||!cat||!status){ showToast("Remplis nom, catégorie et statut"); return; }
  document.getElementById("btn-save").querySelector("span").textContent="Sauvegarde…";
  try{
    await addIdea({name,category:cat,description:desc,status,tags});
    showToast("Idée verrouillée ✓");
    resetForm();
    formModal.classList.remove("open");
  }catch(e){ showToast("Erreur — réessaie"); }
  document.getElementById("btn-save").querySelector("span").textContent="Verrouiller l'idée";
});

function resetForm(){
  ["f-name","f-desc","f-tags"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-cat").selectedIndex=0;
  document.getElementById("f-status").selectedIndex=0;
}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}
</script>
</body>
</html>
